# Replace APP_NAME with your application name throughout this file.
name: Deploy
run-name: Deploy to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, prod]
        default: dev

jobs:
  setup:
    name: Read Environment Config
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      project_id: ${{ steps.vars.outputs.project_id }}
      region: ${{ steps.vars.outputs.region }}
      registry: ${{ steps.vars.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          TFVARS="terraform/environments/${{ inputs.environment }}.tfvars"
          APP_NAME=$(grep '^app_name' $TFVARS | cut -d'"' -f2)
          PROJECT_ID=$(grep '^project_id' $TFVARS | cut -d'"' -f2)
          REGION=$(grep '^region' $TFVARS | cut -d'"' -f2)
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "registry=${REGION}-docker.pkg.dev/${PROJECT_ID}/${APP_NAME}" >> $GITHUB_OUTPUT

  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9
          terraform_wrapper: false

      - name: Create State Bucket
        run: |
          gcloud storage buckets create gs://${{ needs.setup.outputs.project_id }}-tf-state \
            --project=${{ needs.setup.outputs.project_id }} \
            --location=${{ needs.setup.outputs.region }} \
            --uniform-bucket-level-access 2>/dev/null || true

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.project_id }}-tf-state" \
            -backend-config="prefix=${{ needs.setup.outputs.app_name }}/${{ inputs.environment }}"

      - name: Terraform Apply (APIs + Registry)
        working-directory: terraform
        env:
          TF_IN_AUTOMATION: "true"
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.apis \
            -target=google_artifact_registry_repository.main \
            -var-file="environments/${{ inputs.environment }}.tfvars"

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [setup, provision]
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ needs.setup.outputs.region }}-docker.pkg.dev --quiet

      - id: image
        run: echo "ref=${{ needs.setup.outputs.registry }}/backend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-infra:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [setup, build-backend]
    permissions:
      contents: read
      id-token: write
    outputs:
      backend_url: ${{ steps.tf-out.outputs.backend_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.project_id }}-tf-state" \
            -backend-config="prefix=${{ needs.setup.outputs.app_name }}/${{ inputs.environment }}"

      - name: Restore WIF pool if needed
        working-directory: terraform
        run: |
          PROJECT_ID="${{ needs.setup.outputs.project_id }}"
          POOL_ID="github-actions"
          PROVIDER_ID="github-oidc"
          POOL_RESOURCE="projects/${PROJECT_ID}/locations/global/workloadIdentityPools/${POOL_ID}"
          PROVIDER_RESOURCE="${POOL_RESOURCE}/providers/${PROVIDER_ID}"

          IMPORT_ARGS="-var-file=environments/${{ inputs.environment }}.tfvars -var=backend_image=placeholder -var=frontend_image=placeholder"

          # --- Pool ---
          if terraform state show google_iam_workload_identity_pool.github &>/dev/null; then
            echo "WIF pool already in state"
          else
            STATE=$(gcloud iam workload-identity-pools describe "$POOL_ID" \
              --location=global --project="$PROJECT_ID" \
              --format="value(state)" 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATE" = "NOT_FOUND" ]; then
              echo "WIF pool does not exist, Terraform will create it"
            else
              if [ "$STATE" = "DELETED" ]; then
                echo "WIF pool is soft-deleted — undeleting..."
                gcloud iam workload-identity-pools undelete "$POOL_ID" \
                  --location=global --project="$PROJECT_ID"
                sleep 5
              fi
              echo "Importing WIF pool into Terraform state..."
              terraform import $IMPORT_ARGS google_iam_workload_identity_pool.github "$POOL_RESOURCE"
            fi
          fi

          # --- Provider ---
          if terraform state show google_iam_workload_identity_pool_provider.github &>/dev/null; then
            echo "WIF provider already in state"
          else
            PROVIDER_STATE=$(gcloud iam workload-identity-pools providers describe "$PROVIDER_ID" \
              --workload-identity-pool="$POOL_ID" \
              --location=global --project="$PROJECT_ID" \
              --format="value(state)" 2>/dev/null || echo "NOT_FOUND")

            if [ "$PROVIDER_STATE" = "NOT_FOUND" ]; then
              echo "WIF provider does not exist, Terraform will create it"
            else
              if [ "$PROVIDER_STATE" = "DELETED" ]; then
                echo "WIF provider is soft-deleted — undeleting..."
                gcloud iam workload-identity-pools providers undelete "$PROVIDER_ID" \
                  --workload-identity-pool="$POOL_ID" \
                  --location=global --project="$PROJECT_ID"
                sleep 5
              fi
              echo "Importing WIF provider into Terraform state..."
              terraform import $IMPORT_ARGS google_iam_workload_identity_pool_provider.github "$PROVIDER_RESOURCE"
            fi
          fi

      - name: Untaint Cloud Run services
        working-directory: terraform
        run: |
          terraform untaint google_cloud_run_v2_service.backend 2>/dev/null || true
          terraform untaint google_cloud_run_v2_service.frontend 2>/dev/null || true

      - name: Get current frontend image
        id: current-frontend
        run: |
          APP="${{ needs.setup.outputs.app_name }}"
          IMAGE=$(gcloud run services describe \
            "${APP}-frontend-${{ inputs.environment }}" \
            --region=${{ needs.setup.outputs.region }} \
            --project=${{ needs.setup.outputs.project_id }} \
            --format='value(spec.template.spec.containers[0].image)' 2>/dev/null \
            || echo "gcr.io/cloudrun/placeholder")
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_IN_AUTOMATION: "true"
          SECRET_JWT: ${{ secrets.JWT_SECRET }}
        run: |
          EXTRA=""
          [ -n "$SECRET_JWT" ] && EXTRA="$EXTRA -var=jwt_secret=$SECRET_JWT"
          # Add extra -var flags here for any application-specific secrets.
          terraform apply -auto-approve \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -var="backend_image=${{ needs.build-backend.outputs.image }}" \
            -var="frontend_image=${{ steps.current-frontend.outputs.image }}" \
            $EXTRA

      - name: Get DB credentials
        id: get-db
        working-directory: terraform
        run: |
          DB_PASS=$(gcloud secrets versions access latest \
            --secret="db-password-${{ inputs.environment }}" \
            --project="${{ needs.setup.outputs.project_id }}")
          echo "::add-mask::$DB_PASS"
          echo "db_password=$DB_PASS" >> $GITHUB_OUTPUT
          echo "db_connection_name=$(terraform output -raw db_connection_name)" >> $GITHUB_OUTPUT

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o /usr/local/bin/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
          chmod +x /usr/local/bin/cloud-sql-proxy

      - name: Run DB migrations
        working-directory: backend
        env:
          DB_PASS: ${{ steps.get-db.outputs.db_password }}
          DB_CONN: ${{ steps.get-db.outputs.db_connection_name }}
        run: |
          cloud-sql-proxy "$DB_CONN" --port=5432 &
          PROXY_PID=$!
          trap "kill $PROXY_PID 2>/dev/null || true" EXIT
          sleep 4
          npm ci --ignore-scripts
          DB_PASS_ENC=$(node -e "process.stdout.write(encodeURIComponent(process.env.DB_PASS))")
          export DATABASE_URL="postgresql://app:${DB_PASS_ENC}@localhost:5432/app?schema=public"
          npx prisma migrate deploy
          # npx prisma generate
          # npm run seed

      - id: tf-out
        working-directory: terraform
        run: echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [setup, deploy-infra]
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ needs.setup.outputs.region }}-docker.pkg.dev --quiet

      - id: image
        run: echo "ref=${{ needs.setup.outputs.registry }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.image.outputs.ref }}
          build-args: |
            VITE_API_BASE_URL=${{ needs.deploy-infra.outputs.backend_url }}
            # Add extra build-args here for app-specific frontend environment variables.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [setup, build-backend, deploy-infra, build-frontend]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ needs.setup.outputs.project_id }}-tf-state" \
            -backend-config="prefix=${{ needs.setup.outputs.app_name }}/${{ inputs.environment }}"

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_IN_AUTOMATION: "true"
          SECRET_JWT: ${{ secrets.JWT_SECRET }}
        run: |
          EXTRA=""
          [ -n "$SECRET_JWT" ] && EXTRA="$EXTRA -var=jwt_secret=$SECRET_JWT"
          # Add extra -var flags here for any application-specific secrets.
          terraform apply -auto-approve \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -var="backend_image=${{ needs.build-backend.outputs.image }}" \
            -var="frontend_image=${{ needs.build-frontend.outputs.image }}" \
            $EXTRA
